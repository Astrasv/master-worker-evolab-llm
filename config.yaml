project_name: "master-worker-slm"
version: "1.0.0"

# Provider and model settings
llm_providers:
  openrouter:
    base_url: "https://openrouter.ai/api/v1"
    models:
      default: "qwen/qwen2.5-coder-7b-instruct"
      reasoning: "qwen/qwen2.5-coder-7b-instruct"

  chatgroq:
    base_url: "https://api.groq.com/openai/v1"
    models:
      default: "llama-3.1-8b-instant"
      reasoning: "llama-3.1-70b-versatile"

  ollama:
    base_url: "http://localhost:11434/v1"
    models:
      default: "llama3"
      reasoning: "llama3:70b"

# Selected provider
active_provider: openrouter

# agent configs
agents:
  genome_generator:
    model: default 
    temperature: 0.1  
    system_role: "evolutionary algorithm architect"
    
  master:
    model: reasoning
    temperature: 0.1  
    system_role: "architect & task decomposer"
  
  orchestrator:
    model: default
    temperature: 0.1  
    system_role: "architect & task decomposer"

  worker_coder:
    model: default
    temperature: 0.3  
    system_role: "specialized software engineer"

  unit_verifier:
    model: reasoning
    temperature: 0.0 
    system_role: "qa & edge-case specialist"

  integration_verifier:
    model: reasoning
    temperature: 0.1
    system_role: "integration & logic validator"

# --- evolution algorithm defaults ---
ea_defaults:
  language: "python"
  libraries: ["numpy", "scipy", "matplotlib"]
  standard_components:
    - "individual representation"
    - "population initialization"
    - "fitness function"
    - "selection mechanism"
    - "genetic operators (crossover/mutation)"
    - "evolutionary loop"

# --- execution sandbox ---
sandbox:
  enabled: true
  timeout_seconds: 10
  allow_network: false
  max_memory_mb: 512

# --- worker configuration ---
workers:
  num_workers: 3  # Number of parallel workers to process subtasks
