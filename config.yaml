project_name: "master-worker-slm"
version: "1.0.0"

# global provider settings (used as fallback)
provider: "chatgroq" 
base_url: "https://api.groq.com/openai/v1"

# agent configs
agents:
  genome_generator:
    provider: "chatgroq"
    model_name: "llama-3.3-70b-versatile"
    temperature: 0.1  
    system_role: "evolutionary algorithm architect"
    
  master:
    provider: "chatgroq"
    model_name: "llama-3.3-70b-versatile"
    temperature: 0.1  
    system_role: "architect & task decomposer"
  
  orchestrator:
    provider: "chatgroq"
    model_name: "llama-3.3-70b-versatile"
    temperature: 0.1  
    system_role: "architect & task decomposer"

  worker_coder:
    provider: "chatgroq"
    model_name: "llama-3.3-70b-versatile"
    temperature: 0.3  
    system_role: "specialized software engineer"

  unit_verifier:
    provider: "chatgroq"
    model_name: "llama-3.3-70b-versatile"
    temperature: 0.0 
    system_role: "qa & edge-case specialist"

  integration_verifier:
    provider: "chatgroq"
    model_name: "llama-3.3-70b-versatile"
    temperature: 0.1
    system_role: "integration & logic validator"

# --- evolution algorithm defaults ---
ea_defaults:
  language: "python"
  libraries: ["numpy", "scipy", "matplotlib"]
  standard_components:
    - "individual representation"
    - "population initialization"
    - "fitness function"
    - "selection mechanism"
    - "genetic operators (crossover/mutation)"
    - "evolutionary loop"

# --- execution sandbox ---
sandbox:
  enabled: true
  timeout_seconds: 10
  allow_network: false
  max_memory_mb: 512